<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>话题盲盒 - 和朋友聊什么？</title>
    <style>
        :root {
            --bg: #fdf6f0;
            --card-bg: #ffffff;
            --primary: #ff6b6b;
            --primary-hover: #e55a5a;
            --secondary: #ffa94d;
            --accent: #ffd43b;
            --text: #2d3436;
            --text-light: #636e72;
            --border: #f1e6dc;
            --tag-bg: #fff3e0;
            --tag-text: #e67e22;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.10);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.14);
            --radius: 20px;
            --radius-sm: 12px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 15%, rgba(255, 107, 107, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 75%, rgba(255, 169, 77, 0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 212, 59, 0.04) 0%, transparent 60%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ========== 主容器 ========== */
        .app-container {
            width: 100%;
            max-width: 460px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        /* ========== 头部 ========== */
        .app-header {
            text-align: center;
            animation: fadeInDown 0.6s ease-out;
        }
        .app-logo {
            font-size: 52px;
            display: block;
            margin-bottom: 6px;
            animation: bounce 2s ease-in-out infinite;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
        }
        .app-title {
            font-size: 26px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.5px;
            line-height: 1.3;
        }
        .app-subtitle {
            font-size: 14px;
            color: var(--text-light);
            font-weight: 400;
            margin-top: 2px;
        }
        .highlight {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ========== 话题卡片 ========== */
        .topic-card-wrapper {
            width: 100%;
            position: relative;
            animation: fadeInUp 0.6s ease-out 0.1s both;
        }

        .topic-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 36px 28px 32px;
            min-height: 160px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: var(--shadow-md);
            border: 2px solid var(--border);
            position: relative;
            overflow: hidden;
            transition: all var(--transition);
            cursor: default;
        }

        .topic-card.rolling {
            border-color: #ffe0c0;
            box-shadow: var(--shadow-lg), 0 0 0 4px rgba(255, 169, 77, 0.12);
            animation: cardPulse 0.5s ease-in-out;
        }

        .topic-card.result {
            border-color: #ffd4a8;
            box-shadow: var(--shadow-lg), 0 0 0 6px rgba(255, 107, 107, 0.08);
            animation: cardReveal 0.5s ease-out;
        }

        .topic-emoji-badge {
            font-size: 40px;
            margin-bottom: 12px;
            transition: transform 0.3s ease;
            display: block;
            line-height: 1;
        }

        .topic-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.5;
            letter-spacing: 0.3px;
            transition: all 0.15s ease;
            word-break: break-word;
        }

        .topic-placeholder {
            color: #c0b8b0;
            font-size: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

            width: 6px;

            border-
